<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2 class="logo">Dashboard</h2>
            <nav class="nav">
                <a href="#">Overview</a>
                <a href="#">Project</a>
                <a href="#">Settings</a>
            </nav>
        </aside>
        <main class="content">
            <h1>Overview</h1>
            <section class="stats">
                <div class="stat-card">
                    <span>Users</span>
                    <strong class="usersNumber">1 245</strong>
                </div>
                <div class="stat-card">
                    <span>Sales</span>
                    <strong class="income">$8 532</strong>
                </div>
                <div class="stat-card">
                    <span>Growth</span>
                    <strong class="growth">+12%</strong>
                </div>
            </section>
            <section class="chart-card">
                <h2>Monthly activity</h2>
                <canvas id="myChart"></canvas>
            </section>
        </main>
    </div>
    <script src="app.js">
    </script>
</body>
</html>
